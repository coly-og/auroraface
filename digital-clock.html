<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Digital Clock - Multiple Time Zones</title>\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        body {\n            font-family: 'Courier New', monospace;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            min-height: 100vh;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            padding: 20px;\n        }\n\n        .container {\n            background: rgba(255, 255, 255, 0.1);\n            backdrop-filter: blur(10px);\n            border-radius: 20px;\n            padding: 40px;\n            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);\n            max-width: 1000px;\n            width: 100%;\n        }\n\n        .title {\n            text-align: center;\n            color: white;\n            font-size: 2.5rem;\n            margin-bottom: 40px;\n            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);\n            font-weight: bold;\n        }\n\n        .clock-grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));\n            gap: 20px;\n            margin-bottom: 30px;\n        }\n\n        .clock-card {\n            background: rgba(255, 255, 255, 0.15);\n            border: 2px solid rgba(255, 255, 255, 0.3);\n            border-radius: 15px;\n            padding: 25px;\n            text-align: center;\n            transition: all 0.3s ease;\n            backdrop-filter: blur(10px);\n        }\n\n        .clock-card:hover {\n            background: rgba(255, 255, 255, 0.25);\n            border-color: rgba(255, 255, 255, 0.5);\n            transform: translateY(-5px);\n            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);\n        }\n\n        .timezone-name {\n            color: #fff;\n            font-size: 1.3rem;\n            margin-bottom: 10px;\n            font-weight: bold;\n            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);\n        }\n\n        .timezone-offset {\n            color: rgba(255, 255, 255, 0.8);\n            font-size: 0.9rem;\n            margin-bottom: 15px;\n        }\n\n        .digital-time {\n            background: rgba(0, 0, 0, 0.3);\n            color: #00ff41;\n            font-size: 2.5rem;\n            padding: 15px;\n            border-radius: 10px;\n            font-weight: bold;\n            letter-spacing: 2px;\n            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);\n            font-family: 'Courier New', monospace;\n            margin-bottom: 10px;\n        }\n\n        .date-info {\n            color: rgba(255, 255, 255, 0.9);\n            font-size: 0.95rem;\n            margin-top: 10px;\n        }\n\n        .controls {\n            display: flex;\n            justify-content: center;\n            gap: 15px;\n            flex-wrap: wrap;\n            margin-bottom: 30px;\n        }\n\n        .control-btn {\n            background: rgba(255, 255, 255, 0.2);\n            color: white;\n            border: 2px solid white;\n            padding: 12px 25px;\n            border-radius: 8px;\n            cursor: pointer;\n            font-size: 1rem;\n            transition: all 0.3s ease;\n            font-weight: bold;\n        }\n\n        .control-btn:hover {\n            background: rgba(255, 255, 255, 0.3);\n            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);\n        }\n\n        .control-btn:active {\n            transform: scale(0.95);\n        }\n\n        .timezone-selector {\n            background: rgba(0, 0, 0, 0.3);\n            color: white;\n            padding: 12px 15px;\n            border: 2px solid white;\n            border-radius: 8px;\n            font-size: 1rem;\n            cursor: pointer;\n            transition: all 0.3s ease;\n        }\n\n        .timezone-selector:focus {\n            outline: none;\n            background: rgba(0, 0, 0, 0.5);\n            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);\n        }\n\n        .footer {\n            text-align: center;\n            color: rgba(255, 255, 255, 0.8);\n            font-size: 0.9rem;\n            margin-top: 20px;\n            border-top: 1px solid rgba(255, 255, 255, 0.2);\n            padding-top: 20px;\n        }\n\n        @media (max-width: 768px) {\n            .container {\n                padding: 20px;\n            }\n\n            .title {\n                font-size: 1.8rem;\n                margin-bottom: 25px;\n            }\n\n            .digital-time {\n                font-size: 2rem;\n            }\n\n            .clock-grid {\n                grid-template-columns: 1fr;\n            }\n        }\n\n        .add-timezone-form {\n            background: rgba(0, 0, 0, 0.2);\n            padding: 20px;\n            border-radius: 10px;\n            margin-bottom: 20px;\n            display: flex;\n            gap: 10px;\n            flex-wrap: wrap;\n        }\n\n        .add-timezone-form input {\n            background: rgba(255, 255, 255, 0.2);\n            color: white;\n            padding: 10px 15px;\n            border: 2px solid white;\n            border-radius: 8px;\n            font-size: 1rem;\n            flex: 1;\n            min-width: 200px;\n        }\n\n        .add-timezone-form input::placeholder {\n            color: rgba(255, 255, 255, 0.7);\n        }\n\n        .add-timezone-form input:focus {\n            outline: none;\n            background: rgba(255, 255, 255, 0.3);\n            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <h1 class=\"title\">🌍 Global Time Zones</h1>\n        \n        <div class=\"controls\">\n            <button class=\"control-btn\" onclick=\"addDefaultTimezones()\">📍 Add Default Zones</button>\n            <button class=\"control-btn\" onclick=\"clearAllClocks()\">🗑️ Clear All</button>\n        </div>\n\n        <div class=\"add-timezone-form\">\n            <input \n                type=\"text\" \n                id=\"timezoneInput\" \n                placeholder=\"Enter timezone (e.g., America/New_York, Europe/London, Asia/Tokyo)\" \n                onkeypress=\"handleEnter(event)\"\n            >\n            <button class=\"control-btn\" onclick=\"addTimezone()\">➕ Add</button>\n        </div>\n\n        <div class=\"clock-grid\" id=\"clockGrid\"></div>\n        \n        <div class=\"footer\">\n            <p>💡 Tip: Enter timezone names like America/New_York, Europe/Paris, Asia/Tokyo, etc.</p>\n            <p>Last updated: <span id=\"lastUpdate\">--:--:--</span></p>\n        </div>\n    </div>\n\n    <script>\n        // Predefined timezone list\n        const TIMEZONES = [\n            'America/New_York',\n            'America/Chicago',\n            'America/Denver',\n            'America/Los_Angeles',\n            'Europe/London',\n            'Europe/Paris',\n            'Europe/Berlin',\n            'Asia/Tokyo',\n            'Asia/Shanghai',\n            'Asia/Hong_Kong',\n            'Asia/Singapore',\n            'Asia/Dubai',\n            'Asia/Bangkok',\n            'Australia/Sydney',\n            'Pacific/Auckland',\n            'America/Sao_Paulo',\n            'Africa/Cairo',\n            'Africa/Johannesburg',\n            'Europe/Moscow',\n            'Asia/Kolkata',\n            'Asia/Seoul',\n            'Pacific/Fiji'\n        ];\n\n        // Store active timezones\n        let activeTimezones = [];\n\n        // Format time with leading zeros\n        function formatTime(hours, minutes, seconds) {\n            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;\n        }\n\n        // Get timezone offset\n        function getTimezoneOffset(timezone) {\n            try {\n                const formatter = new Intl.DateTimeFormat('en-US', {\n                    timeZone: timezone,\n                    hour12: false,\n                    hour: '2-digit',\n                    minute: '2-digit',\n                    second: '2-digit'\n                });\n                \n                const now = new Date();\n                const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));\n                const tzDate = new Date(now.toLocaleString('en-US', { timeZone: timezone }));\n                const offset = (tzDate - utcDate) / (1000 * 60 * 60);\n                \n                return offset;\n            } catch (e) {\n                return null;\n            }\n        }\n\n        // Get time in specific timezone\n        function getTimeInTimezone(timezone) {\n            try {\n                const now = new Date();\n                const formatter = new Intl.DateTimeFormat('en-US', {\n                    timeZone: timezone,\n                    hour12: false,\n                    hour: '2-digit',\n                    minute: '2-digit',\n                    second: '2-digit',\n                    year: 'numeric',\n                    month: '2-digit',\n                    day: '2-digit'\n                });\n                \n                const parts = formatter.formatToParts(now);\n                const values = {};\n                parts.forEach(part => {\n                    values[part.type] = part.value;\n                });\n\n                return {\n                    time: `${values.hour}:${values.minute}:${values.second}`,\n                    date: `${values.month}/${values.day}/${values.year}`\n                };\n            } catch (e) {\n                return null;\n            }\n        }\n\n        // Format timezone name for display\n        function formatTimezoneName(tz) {\n            return tz.replace(/_/g, ' ');\n        }\n\n        // Add timezone to the list\n        function addTimezone() {\n            const input = document.getElementById('timezoneInput');\n            const timezone = input.value.trim();\n            \n            if (!timezone) {\n                alert('Please enter a timezone');\n                return;\n            }\n\n            // Validate timezone\n            if (!getTimeInTimezone(timezone)) {\n                alert('Invalid timezone. Please try another.');\n                return;\n            }\n\n            // Check if already added\n            if (activeTimezones.includes(timezone)) {\n                alert('This timezone is already added');\n                return;\n            }\n\n            activeTimezones.push(timezone);\n            input.value = '';\n            updateClocks();\n        }\n\n        // Remove timezone\n        function removeTimezone(timezone) {\n            activeTimezones = activeTimezones.filter(tz => tz !== timezone);\n            updateClocks();\n        }\n\n        // Add default timezones\n        function addDefaultTimezones() {\n            activeTimezones = [\n                'America/New_York',\n                'Europe/London',\n                'Asia/Tokyo',\n                'Australia/Sydney'\n            ];\n            updateClocks();\n        }\n\n        // Clear all clocks\n        function clearAllClocks() {\n            activeTimezones = [];\n            updateClocks();\n        }\n\n        // Handle Enter key\n        function handleEnter(event) {\n            if (event.key === 'Enter') {\n                addTimezone();\n            }\n        }\n\n        // Update all clocks\n        function updateClocks() {\n            const clockGrid = document.getElementById('clockGrid');\n            const lastUpdate = document.getElementById('lastUpdate');\n            \n            clockGrid.innerHTML = '';\n            \n            activeTimezones.forEach(timezone => {\n                const timeData = getTimeInTimezone(timezone);\n                if (timeData) {\n                    const offset = getTimezoneOffset(timezone);\n                    const offsetStr = offset >= 0 ? `UTC+${offset}` : `UTC${offset}`;\n                    \n                    const card = document.createElement('div');\n                    card.className = 'clock-card';\n                    card.innerHTML = `\n                        <div class=\"timezone-name\">${formatTimezoneName(timezone)}</div>\n                        <div class=\"timezone-offset\">${offsetStr}</div>\n                        <div class=\"digital-time\">${timeData.time}</div>\n                        <div class=\"date-info\">${timeData.date}</div>\n                        <button class=\"control-btn\" style=\"margin-top: 10px; width: 100%;\" onclick=\"removeTimezone('${timezone}')\">Remove</button>\n                    `;\n                    clockGrid.appendChild(card);\n                }\n            });\n\n            if (activeTimezones.length === 0) {\n                clockGrid.innerHTML = '<p style=\"grid-column: 1 / -1; text-align: center; color: white; font-size: 1.2rem;\">No timezones added yet. Click \"Add Default Zones\" to get started!</p>';\n            }\n\n            // Update last update time\n            const now = new Date();\n            const hours = String(now.getHours()).padStart(2, '0');\n            const minutes = String(now.getMinutes()).padStart(2, '0');\n            const seconds = String(now.getSeconds()).padStart(2, '0');\n            lastUpdate.textContent = `${hours}:${minutes}:${seconds}`;\n        }\n\n        // Initialize\n        updateClocks();\n        setInterval(updateClocks, 1000);\n    </script>\n</body>\n</html>\n
